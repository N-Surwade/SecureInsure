<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Insurance Policy Management System</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="assets/logo-icon.png" type="image/png">
</head>
<body>

<header>
    <nav class="container">
        <div class="logo">SecureInsure</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="policies.php">Policies</a></li>
            <li><a href="login.html">Login</a></li>
        </ul>
    </nav>
</header>

<main class="container">
    <h1>User Registration</h1>

    <!-- MESSAGE BOX -->
    <div id="messageBox"></div>

    <form id="register-form" class="flex-form" onsubmit="return handleRegister(event)">
        
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" name="name" required>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" required>
        </div>

        <div class="form-group">
            <label>Phone</label>
            <input type="tel" name="phone" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" required>
        </div>

        <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" name="confirm_password" required>
        </div>

        <button type="submit" class="btn btn-primary">Register</button>
    </form>

    <p style="margin-top:10px;">
        Already have an account?
        <a href="login.html"
           style="background:#007bff;color:white;padding:6px 12px;border-radius:5px;text-decoration:none;">
           Login here
        </a>
    </p>
</main>

<footer>
    <div class="container">
        <p class="footer-bottom">&copy; 2023 SecureInsure</p>
    </div>
</footer>

<script>
function handleRegister(event) {
    event.preventDefault();

    const form = document.getElementById("register-form");
    const formData = new FormData(form);
    const messageBox = document.getElementById("messageBox");

    fetch("process_register.php", {
        method: "POST",
        body: formData
    })
    .then(res => res.text())
    .then(data => {

        if (data.includes("success")) {
            messageBox.innerHTML = `
                <div style="color:green;background:#d4edda;padding:10px;border-radius:5px;margin-bottom:10px;">
                    ✅ Registration Successful!
                </div>
            `;
            form.reset();
        } else {
            messageBox.innerHTML = `
                <div style="color:red;background:#f8d7da;padding:10px;border-radius:5px;margin-bottom:10px;">
                    ${data}
                </div>
            `;
        }
    })
    .catch(() => {
        messageBox.innerHTML = `<div style="color:red;">Server error!</div>`;
    });

    return false;
}
</script>

</body>
</html>
